name: Release

on:
  push:
    branches: [release]

env:
  PLUGIN_SLUG: botspot
  BUCKET: botspot-plugins

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Get version from plugin header
        id: version
        run: |
          VERSION=$(grep "Version:" botspot.php | awk '{print $3}' | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Clear composer GitHub token
        run: composer config --global --unset github-oauth.github.com || true

      - name: Build production zip
        run: TARGET=production ./build.sh

      - name: Build staging zip
        run: TARGET=staging ./build.sh

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to versioned path
        run: |
          gcloud storage cp \
            "dist/${PLUGIN_SLUG}-${{ steps.version.outputs.version }}.zip" \
            "dist/${PLUGIN_SLUG}-${{ steps.version.outputs.version }}-staging.zip" \
            "gs://${BUCKET}/${PLUGIN_SLUG}/v${{ steps.version.outputs.version }}/"

      - name: Promote to latest
        run: |
          gcloud storage cp "dist/${PLUGIN_SLUG}-${{ steps.version.outputs.version }}.zip" "gs://${BUCKET}/${PLUGIN_SLUG}/latest/${PLUGIN_SLUG}.zip"
          gcloud storage cp "dist/${PLUGIN_SLUG}-${{ steps.version.outputs.version }}-staging.zip" "gs://${BUCKET}/${PLUGIN_SLUG}/latest/${PLUGIN_SLUG}-staging.zip"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "${{ env.PLUGIN_SLUG }} ${{ steps.version.outputs.version }}" || true
          git push origin "v${{ steps.version.outputs.version }}" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            dist/${{ env.PLUGIN_SLUG }}-${{ steps.version.outputs.version }}.zip
            dist/${{ env.PLUGIN_SLUG }}-${{ steps.version.outputs.version }}-staging.zip
          generate_release_notes: true
